<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Свадебное приглашение</title>
    <style>
        /* --- ОСНОВНЫЕ СТИЛИ --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #FEF9F6; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 420px; width: 100%; background: #FEF9F6; overflow: hidden; position: relative; }
        .container img { width: 100%; height: auto; display: block; vertical-align: bottom; }
        .container a { display: block; text-decoration: none; line-height: 0; }
        html { scroll-behavior: smooth; }

        /* ====== АНИМАЦИЯ ПОЯВЛЕНИЯ ====== */
        .container img, .container a img, .timer-wrapper {
            opacity: 0;
            animation: fadeIn 0.7s ease forwards;
        }
        .container .form-block {
            opacity: 0;
            animation: fadeIn 0.7s ease forwards;
            animation-delay: 0.40s;
        }

        .container img:nth-child(1) { animation-delay: 0.05s; }
        .container a:nth-child(2) img { animation-delay: 0.10s; }
        .container img:nth-child(3) { animation-delay: 0.15s; }
        .container a:nth-child(4) img { animation-delay: 0.20s; }
        .container img:nth-child(5) { animation-delay: 0.25s; }
        .container a:nth-child(6) img { animation-delay: 0.30s; }
        .container a:nth-child(7) img { animation-delay: 0.35s; }
        /* 8-й элемент — форма, анимация задана через .form-block */
        .container img:nth-child(8) { animation-delay: 0.50s; } /* 9-я картинка */
        .container img:nth-child(9) { animation-delay: 0.55s; } /* 10-я картинка */
        .container .timer-wrapper { animation-delay: 0.60s; }  /* 11-я картинка с таймером */

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce) {
            .container img, .container a img, .container .timer-wrapper, .container .form-block {
                opacity: 1;
                animation: none;
            }
        }

        /* ====== СТИЛИ ДЛЯ ТАЙМЕРА ====== */
        .timer-wrapper { position: relative; width: 100%; }
        .timer-wrapper img { display: block; width: 100%; height: auto; }
        .countdown {
            position: absolute;
            bottom: 28%;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 8%;
            padding: 0 10%;
            font-family: 'Georgia', serif;
            text-align: center;
            color: #5a3f3a;
        }
        .countdown-item { display: flex; flex-direction: column; align-items: center; min-width: 50px; }
        .countdown-number {
            font-size: 32px;
            font-weight: bold;
            line-height: 1;
            letter-spacing: 2px;
            background: transparent;
            padding: 6px 12px;
            border-radius: 12px;
            width: 100%;
            text-align: center;
            color: #5a3f3a;
        }
        .countdown-label {
            font-family: 'Miama Nueva', 'Georgia', serif;
            font-size: 14px;
            letter-spacing: 1px;
            margin-top: 6px;
            color: #b08a7e;
            font-weight: 400;
            font-style: normal;
        }
        @media (max-width: 380px) {
            .countdown-number { font-size: 22px; padding: 4px 8px; }
            .countdown-item { min-width: 35px; }
            .countdown-label { font-size: 11px; letter-spacing: 0.5px; }
        }
        @media (min-width: 421px) {
            .countdown-number { font-size: 40px; padding: 8px 16px; }
            .countdown-label { font-size: 16px; }
        }

        /* ====== СТИЛИ ДЛЯ ФОРМЫ (вместо 8-й картинки) ====== */
        .form-block {
            width: 100%;
            background: #FEF9F6;
            padding: 10px 15px 20px;
            box-sizing: border-box;
        }

        .form-block .form-container {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 150%; /* Высота формы — можно менять */
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .form-block .form-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* ========== БУДУЩИЕ КНОПКИ (скрыты) ========== */
        .actions {
            padding: 20px 25px 30px;
            display: none;
            flex-direction: column;
            gap: 12px;
            background: #FEF9F6;
        }
        .actions a {
            display: block;
            padding: 14px 20px;
            text-align: center;
            font-family: 'Georgia', serif;
            font-size: 16px;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: #e8c4b8;
            color: #5a3f3a;
            box-shadow: 0 4px 12px rgba(232, 196, 184, 0.3);
        }
        .btn-primary:active { transform: scale(0.97); box-shadow: 0 2px 6px rgba(232, 196, 184, 0.2); }
        .btn-secondary {
            background: transparent;
            color: #b08a7e;
            border: 1.5px solid #e8c4b8;
        }
        .btn-secondary:active { transform: scale(0.97); background: rgba(232, 196, 184, 0.08); }
    </style>
</head>
<body>
    <div class="container">

        <!-- ============ 1-я картинка ============ -->
        <img src="1.jpg" alt="Свадебное приглашение — 1">

        <!-- ============ 2-я картинка ============ -->
        <img src="2.jpg" alt="Свадебное приглашение — 2">

        <!-- ============ 3-я картинка — ССЫЛКА НА КАРТУ ============ -->
        <a href="https://yandex.ru/maps/-/CTaxeIY-" target="_blank">
            <img src="3.jpg" alt="Открыть карту">
        </a>

        <!-- ============ 4-я картинка ============ -->
        <img src="4.jpg" alt="Свадебное приглашение — 4">

        <!-- ============ 5-я картинка ============ -->
        <img src="5.jpg" alt="Свадебное приглашение — 5">

        <!-- ============ 6-я картинка — ССЫЛКА НА ПИНТЕРЕСТ ============ -->
        <a href="https://pin.it/3xPNiZrqS" target="_blank">
            <img src="6.jpg" alt="Ссылка на Pinterest">
        </a>

        <!-- ============ 7-я картинка — ССЫЛКА НА ПИНТЕРЕСТ ============ -->
        <a href="https://pin.it/1ldyMaJg9" target="_blank">
            <img src="7.jpg" alt="Ссылка на Pinterest">
        </a>

        <!-- ============ ФОРМА ВМЕСТО 8-й КАРТИНКИ ============ -->
        <div class="form-block">
            <div class="form-container">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfdwrKYhlLesIcCxCJOJncViIuRkskKKhL_hMjJl90xzS3LzQ/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">Загрузка…</iframe>
            </div>
        </div>

        <!-- ============ 9-я картинка ============ -->
        <img src="9.jpg" alt="Свадебное приглашение — 9">

        <!-- ============ 10-я картинка ============ -->
        <img src="10.jpg" alt="Свадебное приглашение — 10">

        <!-- ============ 11-я картинка С ТАЙМЕРОМ ============ -->
        <div class="timer-wrapper">
            <img src="11.jpg" alt="Свадебное приглашение — 11">
            <div class="countdown" id="countdown">
                <div class="countdown-item">
                    <span class="countdown-number" id="days">00</span>
                    <span class="countdown-label">Дней</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="hours">00</span>
                    <span class="countdown-label">Часов</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="minutes">00</span>
                    <span class="countdown-label">Минут</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="seconds">00</span>
                    <span class="countdown-label">Секунд</span>
                </div>
            </div>
        </div>

        <!-- ============ БУДУЩИЕ КНОПКИ ============ -->
        <div class="actions">
            <a href="#" class="btn-primary">✅ Подтвердить присутствие</a>
            <a href="#" class="btn-secondary">📍 Открыть карту</a>
        </div>

    </div>

    <!-- ====== СКРИПТ ТАЙМЕРА ====== -->
    <script>
        (function() {
            const targetDate = new Date(2026, 7, 15, 16, 0);

            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');

            function updateTimer() {
                const now = new Date().getTime();
                const distance = targetDate.getTime() - now;

                if (distance < 0) {
                    daysEl.textContent = '00';
                    hoursEl.textContent = '00';
                    minutesEl.textContent = '00';
                    secondsEl.textContent = '00';
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                daysEl.textContent = String(days).padStart(2, '0');
                hoursEl.textContent = String(hours).padStart(2, '0');
                minutesEl.textContent = String(minutes).padStart(2, '0');
                secondsEl.textContent = String(seconds).padStart(2, '0');
            }

            updateTimer();
            setInterval(updateTimer, 1000);
        })();
    </script>

</body>
</html>
