<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Свадебное приглашение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FEF9F6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 420px;
            width: 100%;
            background: #FEF9F6;
            overflow: hidden;
            position: relative;
        }

        .container img {
            width: 100%;
            height: auto;
            display: block;
            vertical-align: bottom;
        }

        /* Ссылка-обёртка для картинки — убирает подчёркивание */
        .container a {
            display: block;
            text-decoration: none;
            line-height: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        /* ====== АНИМАЦИЯ ПОЯВЛЕНИЯ ====== */
        .container img,
        .container a img {
            opacity: 0;
            animation: fadeIn 0.7s ease forwards;
        }

        /* Задержки для всех 11 картинок */
        .container img:nth-child(1) { animation-delay: 0.05s; }
        .container a:nth-child(2) img { animation-delay: 0.10s; }
        .container img:nth-child(3) { animation-delay: 0.15s; }
        .container a:nth-child(4) img { animation-delay: 0.20s; }
        .container img:nth-child(5) { animation-delay: 0.25s; }
        .container a:nth-child(6) img { animation-delay: 0.30s; }
        .container a:nth-child(7) img { animation-delay: 0.35s; }
        .container img:nth-child(8) { animation-delay: 0.40s; }
        .container img:nth-child(9) { animation-delay: 0.45s; }
        .container img:nth-child(10) { animation-delay: 0.50s; }
        .container img:nth-child(11) { animation-delay: 0.55s; }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .container img,
            .container a img {
                opacity: 1;
                animation: none;
            }
        }

        /* ========== КНОПКИ ВНИЗУ (пока скрыты) ========== */
        .actions {
            padding: 20px 25px 30px;
            display: none;
            flex-direction: column;
            gap: 12px;
            background: #FEF9F6;
        }

        .actions a {
            display: block;
            padding: 14px 20px;
            text-align: center;
            font-family: 'Georgia', serif;
            font-size: 16px;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #e8c4b8;
            color: #5a3f3a;
            box-shadow: 0 4px 12px rgba(232, 196, 184, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.97);
            box-shadow: 0 2px 6px rgba(232, 196, 184, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: #b08a7e;
            border: 1.5px solid #e8c4b8;
        }

        .btn-secondary:active {
            transform: scale(0.97);
            background: rgba(232, 196, 184, 0.08);
        }

        .footer-text {
            text-align: center;
            font-family: 'Georgia', serif;
            font-size: 12px;
            color: #d4c4bd;
            padding: 16px 0 28px;
            letter-spacing: 1px;
            background: #FEF9F6;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ============ 1-я картинка ============ -->
        <img src="1.jpg" alt="Свадебное приглашение — 1">

        <!-- ============ 2-я картинка ============ -->
        <img src="2.jpg" alt="Свадебное приглашение — 2">

        <!-- ============ 3-я картинка — ССЫЛКА НА КАРТУ ============ -->
        <a href="https://yandex.ru/maps/-/CTaxeIY-" target="_blank">
            <img src="3.jpg" alt="Открыть карту">
        </a>

        <!-- ============ 4-я картинка ============ -->
        <img src="4.jpg" alt="Свадебное приглашение — 4">

        <!-- ============ 5-я картинка ============ -->
        <img src="5.jpg" alt="Свадебное приглашение — 5">

        <!-- ============ 6-я картинка — ССЫЛКА НА ПИНТЕРЕСТ ============ -->
        <a href="https://pin.it/3xPNiZrqS" target="_blank">
            <img src="6.jpg" alt="Ссылка на Pinterest">
        </a>

        <!-- ============ 7-я картинка — ССЫЛКА НА ПИНТЕРЕСТ ============ -->
        <a href="https://pin.it/1ldyMaJg9" target="_blank">
            <img src="7.jpg" alt="Ссылка на Pinterest">
        </a>

        <!-- ============ 8-я картинка ============ -->
        <img src="8.jpg" alt="Свадебное приглашение — 8">

        <!-- ============ 9-я картинка ============ -->
        <img src="9.jpg" alt="Свадебное приглашение — 9">

        <!-- ============ 10-я картинка ============ -->
        <img src="10.jpg" alt="Свадебное приглашение — 10">

        <!-- ============ 11-я картинка ============ -->
        <img src="11.jpg" alt="Свадебное приглашение — 11">

        <!-- ============ БЛОК ДЛЯ БУДУЩИХ КНОПОК (пока скрыт) ============ -->
        <div class="actions">
            <a href="#" class="btn-primary">✅ Подтвердить присутствие</a>
            <a href="#" class="btn-secondary">📍 Открыть карту</a>
        </div>

        <div class="footer-text">С нетерпением ждём вас ❤️</div>
    </div>
</body>
</html>
